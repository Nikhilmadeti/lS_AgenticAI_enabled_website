<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="css/style.css">

<script src="js/storage.js"></script>

</head>

<body>

<header>

<h1>Finance Tracker</h1>

<nav>

<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="add-transaction.html">Add Transaction</a>
<a href="history.html">History</a>
<a href="reports.html">Reports</a>
<a href="assistant.html">AI Assistant</a>

</nav>

</header>

<div class="container">

<h2>Settings</h2>

<label>

Monthly Budget (₹)

</label>

<input
type="number"
id="budget">

<br><br>

<label>

<input
type="checkbox"
id="darkMode">

Enable Dark Mode

</label>

<br><br>

<button id="saveBtn">

Save Settings

</button>

<button id="resetBtn">

Reset All Data

</button>

<p id="message"></p>

</div>

<script>
const budget = document.getElementById("budget");
const darkMode = document.getElementById("darkMode");
const message = document.getElementById("message");

const settings = getSettings();

budget.value = settings.budget;
darkMode.checked = settings.darkMode;

function applyDarkMode(enabled) {
    document.body.classList.toggle("dark", enabled);
}

applyDarkMode(settings.darkMode);

// Toggle dark mode immediately
darkMode.addEventListener("change", () => {

    const current = getSettings();

    saveSettings({
        budget: current.budget,
        currency: "₹",
        darkMode: darkMode.checked
    });

    applyDarkMode(darkMode.checked);

});

// Save only the budget
document.getElementById("saveBtn").onclick = () => {

    const current = getSettings();

    saveSettings({
        budget: Number(budget.value),
        currency: "₹",
        darkMode: current.darkMode
    });

    message.innerHTML = "Settings Saved!";
    message.style.color = "green";

};

// Reset all transactions
document.getElementById("resetBtn").onclick = () => {

    if (confirm("Delete all transactions?")) {

        clearTransactions();

        message.innerHTML = "All Data Cleared!";
        message.style.color = "red";

    }

};
</script>

</body>
</html>
